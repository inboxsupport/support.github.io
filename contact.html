<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center | SwartzTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; display: flex; items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 450px; padding: 40px; position: relative; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); color: white; width: 100%; padding: 15px 25px; border-radius: 1.25rem; transition: all 0.3s ease; margin-bottom: 20px; }
        .input-box:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); outline: none; }
        .send-btn { background: #2563eb; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 1.25rem; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .send-btn:hover { background: #1d4ed8; box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600/20 rounded-2xl mb-4">
                <i class="fa-solid fa-headset text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Messages Goes To</h2>
            <p class="text-gray-400 text-sm mt-2 font-medium">contact@support.swartztech.com</p>
        </div>

        <div id="formWrapper">
            <input type="text" id="userName" placeholder="Your Name" class="input-box">
            <input type="email" id="userEmail" placeholder="Your Email Address" class="input-box">
            <textarea id="userMessage" rows="4" placeholder="How can we help you?" class="input-box resize-none"></textarea>

            <button onclick="sendToTelegram()" id="submitBtn" class="send-btn">
                <span>Send Message</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div id="successMessage" class="hidden text-center py-10">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-check text-3xl text-green-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white">Message Sent Successfully!</h3>
            <p class="text-gray-400 mt-2">Usually it takes 24 hours to get reply your message. Please don't mind, our team will reply you soon. Check your email and samp folder.</p>
        </div>
    </div>

    <script>
        async function sendToTelegram() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const message = document.getElementById('userMessage').value;
            const btn = document.getElementById('submitBtn');

            // Md. Abdullah
            const sourceSite = window.location.hostname; 

            if (!name || !email || !message) {
                alert("দয়া করে সব ঘর পূরণ করুন!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Sending...';

            const botToken = "7865234174:AAGcqZMOHTpMYw06tdvtUXfrk97tFrdXQlI";
            const chatId = "-1003677808284";

            // Md. Abdullah
            const text = `🚀 *New Contact Inquiry*\n\n🌐 *Source:* ${sourceSite}\n👤 *Name:* ${name}\n📧 *Email:* ${email}\n📝 *Message:* ${message}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    document.getElementById('formWrapper').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    alert("মেসেজ পাঠানো যায়নি। দয়া করে আবার চেষ্টা করুন।");
                    btn.disabled = false;
                    btn.innerHTML = 'Send Message';
                }
            } catch (error) {
                alert("ইন্টারনেট কানেকশন চেক করুন।");
                btn.disabled = false;
                btn.innerHTML = 'Send Message';
            }
        }
    </script>
</body>
</html>
